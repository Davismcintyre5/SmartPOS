# electron-builder.yml
appId: com.smartpos.desktop
productName: SmartPOS
directories:
  output: release
  buildResources: public
files:
  - dist/**/*
  - electron/**/*
  - public/**/*
  - package.json
win:
  target:
    - nsis
  icon: public/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  icon: public/icon.png
linux:
  target:
    - AppImage
  icon: public/icon.png